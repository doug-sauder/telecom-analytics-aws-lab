apiVersion: 1

datasources:
  - name: Postgres
    uid: grafana-postgresql-datasource
    type: postgres
    access: proxy
    url: postgres:5432
    user: telecom
    secureJsonData:
      password: telecom
    jsonData:
      database: telecom
      sslmode: disable
      postgresVersion: 1800
      timescaledb: false
    isDefault: true
    editable: false
