name: analytics

services:

  # Service to similate a telecom telemetry agent, sending PM events as a Kafka producer
  pmgen:
    build:
      context: ../../services/pmgen
      dockerfile: Dockerfile
    depends_on:
      ingest:
        condition: service_healthy
    environment:
      - PMGEN_KAFKA_BROKER=redpanda:9092
      - PMGEN_KAFKA_TOPIC=pm.events
      - PMGEN_TARGET_URL=http://ingest:3000/v1/events
      - PMGEN_INTERVAL_SECONDS=5
      - PMGEN_CELL_COUNT=50
      - PMGEN_SOURCE=pmgen
      - PMGEN_SCHEMA_VERSION=1
      - PMGEN_SCENARIO=steady
      - PMGEN_REQUEST_TIMEOUT_SECONDS=5
    networks:
      - analytics-net
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz', timeout=3).read()"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  # Service to ingest events as a Kafka consumer and store them in the database
  ingest:
    build:
      context: ../../services/ingest
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    environment:
      - PGHOST=postgres
      - PGUSER=telecom
      - PGPASSWORD=telecom
      - PGDATABASE=telecom
      - PORT=3000
      - BROKER_URL=redpanda:9092
      - TOPIC_NAME=pm.events
      - BATCH_SIZE=100
      - POLL_INTERVAL_MS=500
      - CONSUMER_GROUP_ID=telecom.analytics.ingest
    networks:
      - analytics-net
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/readyz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  # Postgres - database to store PM events
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: telecom
      POSTGRES_PASSWORD: telecom
      POSTGRES_DB: telecom
      PGDATA: /var/lib/postgresql/18/docker
    networks:
      - analytics-net
    volumes:
      - pgdata:/var/lib/postgresql
      - ../db/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../db/02-monitoring-user.sql:/docker-entrypoint-initdb.d/02-monitoring-user.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telecom"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 5

  # Service to export Postgres metrics to Prometheus
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_URI: "postgres:5432/telecom?sslmode=disable"
      DATA_SOURCE_USER: "postgres_exporter"
      DATA_SOURCE_PASS: "insecure=dev.only"
      PG_EXPORTER_COLLECTION_TIMEOUT: 10s
    networks:
      - analytics-net
    ports:
      - "9187:9187"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics >/dev/null 2>&1 || exit 1"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  # Redpanda - event broker (Kafka substitute)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.2
    command:
      - redpanda
      - start
      - --mode dev-container
      - --smp 1
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - analytics-net
    ports:
      - "19092:19092"
      - "9644:9644"
    volumes:
      - ../redpanda/bootstrap.yaml:/etc/redpanda/.bootstrap.yaml 

  # Init container to create the Kafka topic in Redpanda
  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.2
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "rpk --brokers redpanda:9092 topic create pm.events
      --partitions 1
      --replicas 1
      --if-not-exists"
    restart: "no"
    networks:
      - analytics-net

  # Prometheus - metrics collector
  prometheus:
    image: prom/prometheus:v3.7.3
    depends_on:
      postgres-exporter:
        condition: service_healthy
    volumes:
      - ../prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    networks:
      - analytics-net
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Grafana - metrics visualization  
  grafana:
    image: grafana/grafana:11.6.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - analytics-net
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

# Named network shared by all services
networks:
  analytics-net:

volumes:
  pgdata:
  prometheus-data:
  grafana-data:
