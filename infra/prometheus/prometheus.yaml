global:
  scrape_interval: 15s

scrape_configs:

  - job_name: redpanda
    static_configs:
      - targets:
        - redpanda:9644
    metrics_path: /public_metrics

  - job_name: postgres
    static_configs:
      - targets:
        - postgres-exporter:9187

  - job_name: pmgen
    static_configs:
      - targets:
        - pmgen:8000
    metrics_path: /metrics

  - job_name: ingest
    static_configs:
      - targets:
        - ingest:3000
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets:
        - prometheus:9090
