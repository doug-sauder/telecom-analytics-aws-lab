apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-test
  namespace: telecom-analytics
  labels:
    app.kubernetes.io/name: smoke-test
    app.kubernetes.io/component: validation
    app.kubernetes.io/part-of: cloud-native-telecom-analytics
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smoke-test
        app.kubernetes.io/component: validation
        app.kubernetes.io/part-of: cloud-native-telecom-analytics
    spec:
      restartPolicy: Never
      containers:
        - name: smoke-test
          image: telecom-analytics-smoke-test:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: smoke-test-config
            - secretRef:
                name: smoke-test-secret

