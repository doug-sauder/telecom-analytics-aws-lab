global:
  scrape_interval: 15s

scrape_configs:
  - job_name: redpanda
    static_configs:
      - targets:
          - redpanda.data-services.svc.cluster.local:9644
    metrics_path: /public_metrics

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter.monitoring.svc.cluster.local:9187

  - job_name: pmgen
    static_configs:
      - targets:
          - pmgen.telecom-analytics.svc.cluster.local:8000
    metrics_path: /metrics

  - job_name: ingest
    static_configs:
      - targets:
          - ingest.telecom-analytics.svc.cluster.local:3000
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus.monitoring.svc.cluster.local:9090
