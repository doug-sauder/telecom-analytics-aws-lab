apiVersion: 1

datasources:
  - name: Postgres
    uid: grafana-postgresql-datasource
    type: postgres
    access: proxy
    url: $POSTGRES_URI
    user: $POSTGRES_USER
    secureJsonData:
      password: $POSTGRES_PASSWORD
    jsonData:
      database: $POSTGRES_DB
      sslmode: disable
      postgresVersion: 1800
      timescaledb: false
    isDefault: true
    editable: false

  - name: Prometheus
    uid: grafana-prometheus-datasource
    type: prometheus
    access: proxy
    url: $PROMETHEUS_URI
    isDefault: false
    editable: false
