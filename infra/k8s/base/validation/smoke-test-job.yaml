apiVersion: batch/v1
kind: Job
metadata:
  name: step3-smoke-test
  namespace: telecom-analytics
  labels:
    app.kubernetes.io/name: step3-smoke-test
    app.kubernetes.io/component: validation
    app.kubernetes.io/part-of: cloud-native-telecom-analytics
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: step3-smoke-test
        app.kubernetes.io/component: validation
        app.kubernetes.io/part-of: cloud-native-telecom-analytics
    spec:
      restartPolicy: Never
      containers:
        - name: smoke-test
          image: telecom-analytics-smoke-test:local
          imagePullPolicy: IfNotPresent
          env:
            - name: SMOKE_CHECK_PROMETHEUS
              value: "false"
            - name: SMOKE_VALIDATE_PMGEN_FLOW
              value: "true"
            - name: SMOKE_INGEST_READY_URL
              value: http://ingest.telecom-analytics.svc.cluster.local:3000/readyz
            - name: SMOKE_PMGEN_READY_URL
              value: http://pmgen.telecom-analytics.svc.cluster.local:8000/readyz
            - name: SMOKE_KAFKA_BROKER
              value: redpanda.data-services.svc.cluster.local:9092
            - name: SMOKE_KAFKA_TOPIC
              value: pm.events
            - name: SMOKE_PGHOST
              value: postgres.data-services.svc.cluster.local
            - name: SMOKE_PGPORT
              value: "5432"
            - name: SMOKE_PGUSER
              value: telecom
            - name: SMOKE_PGPASSWORD
              value: telecom
            - name: SMOKE_PGDATABASE
              value: telecom
            - name: SMOKE_DB_POLL_TIMEOUT_SECONDS
              value: "60"
            - name: SMOKE_DB_POLL_INTERVAL_SECONDS
              value: "2"
