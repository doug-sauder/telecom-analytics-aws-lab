apiVersion: batch/v1
kind: Job
metadata:
  name: redpanda-topic-init
  namespace: data-services
  labels:
    app.kubernetes.io/name: redpanda-topic-init
    app.kubernetes.io/component: broker-init
    app.kubernetes.io/part-of: cloud-native-telecom-analytics
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda-topic-init
        app.kubernetes.io/component: broker-init
        app.kubernetes.io/part-of: cloud-native-telecom-analytics
    spec:
      restartPolicy: OnFailure
      containers:
        - name: redpanda-topic-init
          image: docker.redpanda.com/redpandadata/redpanda:v26.1.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              broker="redpanda.data-services.svc.cluster.local:9092"

              until rpk --brokers "$broker" cluster info >/dev/null 2>&1; do
                echo "Waiting for Redpanda at $broker"
                sleep 5
              done

              rpk --brokers "$broker" topic create pm.events \
                --partitions 1 \
                --replicas 1 \
                --if-not-exists
