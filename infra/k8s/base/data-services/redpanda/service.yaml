apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: data-services
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/component: broker
    app.kubernetes.io/part-of: cloud-native-telecom-analytics
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
    - name: admin
      port: 9644
      targetPort: admin
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-internal
  namespace: data-services
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/component: broker
    app.kubernetes.io/part-of: cloud-native-telecom-analytics
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
    - name: admin
      port: 9644
      targetPort: admin
